category: cpu
slug_pattern: '^[a-z0-9-]+$'

groups:
  - key: basic
    order: 1
  - key: spec
    order: 2
  - key: memory
    order: 3
  - key: extensions
    order: 4
  - key: display
    order: 5
  - key: other
    order: 6

fields:

  # --------------基本--------------
  - key: slug
    type: string
    pattern: '^[a-z0-9-]+$'
    required: true

  - key: brand
    type: enum
    values: [ AMD, Intel, Moorethreads ]
    required: true
    group: basic
    filter:
      control: enum
      label_map: { AMD: AMD, Intel: Intel, Moorethreads: 摩尔线程 }

  - key: model
    type: string
    required: true
    group: basic

  - key: family
    type: string
    group: basic

  - key: series
    type: string
    group: basic
    filter:
      control: enum

  - key: form_factor
    type: string
    group: basic

  - key: codename
    type: string
    group: basic

  - key: socket
    type: string
    list: true
    group: basic
    filter:
      control: enum

  - key: architecture
    type: string
    brand_only: AMD
    group: basic

  - key: release_date
    type: string
    pattern: '^\d{4}-\d{2}$'
    group: basic
    filter:
      control: year

  # --------------规格--------------
  - key: cores
    type: integer
    positive: true
    group: spec
    list: true
    filter:
      control: range
      stepKind: integer

  - key: threads
    type: integer
    positive: true
    group: spec

  - key: base_clock_ghz
    type: number
    positive: true
    unit: GHz
    group: spec
    list: true
    filter:
      control: range
      stepKind: decimal

  - key: boost_clock_ghz
    type: number
    positive: true
    unit: GHz
    group: spec
    list: true
    filter:
      control: range
      stepKind: decimal

  - key: l1_cache_kb
    type: integer
    nonnegative: true
    unit: KB
    brand_only: AMD
    group: spec

  - key: l2_cache_mb
    type: number
    nonnegative: true
    unit: MB
    group: spec

  - key: l3_cache_mb
    type: integer
    nonnegative: true
    unit: MB
    group: spec
    filter:
      control: range
      stepKind: integer

  - key: tdp_w
    type: integer
    positive: true
    unit: W
    group: spec
    list: true
    filter:
      control: range
      stepKind: integer

  - key: tjmax
    type: integer
    positive: true
    unit: °C
    group: spec

  - key: process_nm
    type: integer
    positive: true
    unit: nm
    group: spec

  - key: io_process_nm
    type: integer
    positive: true
    unit: nm
    brand_only: AMD
    group: spec

  - key: chipsets
    type: array
    items:
      {
        type: enum,
        values:
          [
            A620,
            X670E,
            X670,
            B650E,
            B650,
            X870E,
            X870,
            B840,
            B850,
            A520,
            B350,
            B450,
            B550,
            X370,
            X470,
            X570,
            FP11,
            Pro 695,
            TRX50,
            WRX90
          ]
      }
    group: spec
    brand_only: AMD

  - key: instruction
    type: string
    group: spec

  - key: ext_instruction
    type: array
    items: { type: string }
    nullable: true
    group: spec

  - key: pbo
    type: bool
    brand_only: AMD
    group: spec

  - key: perf_cores
    type: integer
    positive: true
    brand_only: Intel
    group: spec

  - key: eff_cores
    type: integer
    nonnegative: true
    brand_only: Intel
    group: spec

  - key: perf_core_base_ghz
    type: number
    positive: true
    unit: GHz
    brand_only: Intel
    group: spec

  - key: perf_core_boost_ghz
    type: number
    positive: true
    unit: GHz
    brand_only: Intel
    group: spec

  - key: eff_core_base_ghz
    type: number
    nonnegative: true
    unit: GHz
    brand_only: Intel
    group: spec

  - key: eff_core_boost_ghz
    type: number
    nonnegative: true
    unit: GHz
    brand_only: Intel
    group: spec

  - key: max_turbo_power_w
    type: integer
    positive: true
    unit: W
    brand_only: Intel
    group: spec

  # --------------内存--------------
  - key: supported_memory_types
    type: array
    items:
      {
        type: enum,
        values:
          [
            DDR3,
            DDR3L,
            DDR4,
            DDR5,
            DDR4 - Up to 3200,
            DDR5 (FP7r2),
            DDR5 (FP8),
            LPDDR3,
            LPDDR4,
            LPDDR4 - Up to 4266,
            LPDDR4X,
            LPDDR4x,
            LPDDR5,
            LPDDR5X,
            LPDDR5X (FP7-FP8),
            LPDDR5X (FP7)
          ]
      }
    group: memory

  - key: memory_channel
    type: integer
    positive: true
    group: memory

  - key: max_memory
    type: integer
    positive: true
    unit: GB
    group: memory

  - key: max_memory_speed_mt
    type: integer
    positive: true
    unit: MT/s
    group: memory
    filter:
      control: range
      stepKind: integer

  - key: expo
    type: bool
    brand_only: AMD
    group: memory

  - key: memory_subtype
    type: enum
    values: [ UDIMM, RDIMM, SO-DIMM, "UDIMM , SO-DIMM" ]
    brand_only: AMD
    group: memory

  - key: max_memory_bandwidth_gbs
    type: number
    positive: true
    unit: GB/s
    group: memory

  - key: ecc_memory
    type: bool
    group: memory

  # --------------扩展--------------
  - key: pcie_version
    type: enum
    values: [ "2.0", "3.0", "4.0", "5.0" ]
    required: false
    list: true
    group: extensions
    filter:
      control: enum

  - key: pcie_channels
    type: integer
    brand_only: AMD
    group: extensions

  - key: usb
    type: array
    items: { type: string }
    brand_only: AMD
    nullable: true
    group: extensions

  - key: nvme
    type: array
    items: { type: enum, values: [ Boot, RAID0, RAID1, RAID5, RAID10 ] }
    brand_only: AMD
    nullable: true
    group: extensions

  # --------------显示--------------
  - key: integrated_graphics
    type: string
    nullable: true
    group: display
    list: true

  - key: graphics_frequency
    type: integer
    nonnegative: true
    nullable: true
    unit: MHz
    group: display

  - key: execution_units
    type: integer
    nonnegative: true
    group: display
  # 注:AMD CUs 已并入 execution_units (通用 GPU 计算单元数;Intel 叫 EU, AMD 叫 CU)

  - key: graphics_output
    type: string
    group: display

  - key: max_resolution_hdmi
    type: string
    group: display

  - key: max_resolution_dp
    type: string
    group: display

  - key: max_resolution_edp
    type: string
    group: display

  - key: directx
    type: string
    group: display

  - key: opengl
    type: string
    group: display

  - key: opencl
    type: string
    group: display

  - key: codec_engines
    type: integer
    nonnegative: true
    group: display

  - key: quick_sync
    type: bool
    group: display

  - key: clear_video
    type: bool
    group: display

  - key: max_displays
    type: integer
    nonnegative: true
    group: display

  - key: gpu_device_id
    type: string
    group: display

  - key: product_id_boxed
    type: string
    brand_only: AMD
    group: other

  - key: product_id_tray
    type: string
    brand_only: AMD
    group: other

  - key: hyper_threading
    type: bool
    brand_only: Intel
    group: other

  - key: turbo_boost
    type: string
    brand_only: Intel
    group: other

  - key: vpro
    type: string
    brand_only: Intel
    group: other

  - key: vt_x
    type: bool
    brand_only: Intel
    group: other

  - key: vt_d
    type: bool
    brand_only: Intel
    group: other

  - key: aes_ni
    type: bool
    brand_only: Intel
    group: other

  # --------------来源--------------
  - key: url
    type: string
    pattern: '^https:\/\/'
    nullable: true
    # 故意不挂 group: 详情页底部链接读取，不在 SpecTable / 列表里渲染

    # ======= 衍生字段  =======
derived_fields:
  - key: name
    formula: '{brand} {model}'
    link: '/cpu/{slug}'
    list: true

  - key: cores_threads
    formula: '{cores} / {threads}'

  - key: clocks
    formula: '{base_clock_ghz} / {boost_clock_ghz}'

  - key: tdp_l3
    formula: '{tdp_w} / {l3_cache_mb ?? "—"}'
