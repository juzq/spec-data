# spec-data 仓库的 GitHub Actions 模板
#
# 此文件需要复制到 spec-data 仓库的 .github/workflows/trigger-main.yml
# 用于在数据合并后通知 spec-base 主仓库

name: Notify spec-base main repo

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch event to spec
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.SPEC_BASE_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/juzq/spec/dispatches \
            -d '{"event_type": "data-updated"}'

# 配置说明：
# 1. 在 spec-data 仓库的 Settings → Secrets and variables → Actions 中新增 secret：
#    Name: SPEC_BASE_DISPATCH_TOKEN
#    Value: 一个有 repo 权限的 GitHub PAT（可以专门为这个用途生成）
# 2. 将 <owner> 替换为 spec-base 仓库的所有者用户名
# 3. 此 Action 仅在 main 分支收到 push 时触发（PR 合并或直接 push）