    group: seats_steering
  - key: electric_adjust_seat
    type: string
    group: seats_steering
  - key: seat_ventilation
    type: string
    group: seats_steering
  - key: seat_heating
    type: string
    group: seats_steering
  - key: seat_massage
    type: string
    group: seats_steering
  - key: seat_memory
    type: string
    group: seats_steering
  - key: seat_welcome_guest
    type: string
    group: seats_steering
  - key: seat_leg_rest
