    group: doors_windows
# ------------ seats_steering ------------
  - key: seat_num
    type: integer
    positive: true
    group: seats_steering
    unit: pcs
    filter:
      control: range
      stepKind: integer
  - key: seat_layout
    type: enum
    values: [2+3, 2+2+2, 2+2+3, 2+3+2]
    group: seats_steering
  - key: seat_material
    type: enum
    values: [Nappa, TopLayerLeather, Leather, Fabric]
