groups:
  - basic
  - battery
  - drivetrain
  - suspension
  - wheel
  - light
  - doors_windows
  - seats_steering
  - interior_convenience
  - cockpit_display
  - audio_entertainment
  - climate_comfort
  - smart_connect_safety
  - active_safe
  - passive_safety
  - adas
  - option


fields:
  - key: slug
    type: string
    pattern: '^[a-z0-9-]+$'
    required: true
# ------------ basic ------------
  - key: brand
    type: enum
    values: [BYD, Leap Motor]
    required: true
    group: basic
    filter:
      control: enum
  - key: model
    type: string
    required: true
    group: basic
  - key: type
    type: enum
    values: [SUV, HB, Sedan, MPV, Wagon]
    required: true
    group: basic
    list: true
    filter:
      control: enum
  - key: energy_type
    type: enum
    values: [EV, PHEV, REEV, PV]
    required: true
    group: basic
    list: true
    filter:
      control: enum
  - key: release_date
    type: date
    list: true
    group: basic
    filter:
      control: range
      stepKind: month
  - key: price
    type: number
    positive: true
    list: true
    group: basic
    unit: wan-yuan
    filter:
      control: range
      stepKind: decimal
      step: 0.01
  - key: color
    type: string
    group: basic
  - key: interior_color
    type: string
    group: basic
  - key: length
    type: integer
    positive: true
    group: basic
    unit: mm
    filter:
      control: range
      stepKind: integer
  - key: width
    type: integer
    positive: true
    group: basic
    unit: mm
  - key: height
    type: integer
    positive: true
    group: basic
    unit: mm
  - key: wheelbase
    type: integer
    positive: true
    list: true
    group: basic
    unit: mm
    filter:
      control: range
      stepKind: integer
  - key: voltage_platform
    type: integer
    positive: true
    list: true
    group: basic
    unit: V
    filter:
      control: range
      stepKind: integer
  - key: curb_weight
    type: integer
    positive: true
    list: true
    group: basic
    unit: kg
    filter:
      control: range
      stepKind: integer
  - key: whole_warranty
    type: string
    group: basic
  - key: max_km_per_12_month
    type: integer
    positive: true
    group: basic
    unit: km
# ------------ battery ------------
  - key: battery_type
    type: array
    items: {
      type: enum,
      values: [LFP, TL]
    }
    group: battery
    filter:
      control: enum
  - key: battery_cell_brand
    type: enum
    values: [CATL, Fudi]
    group: battery
  - key: battery_technology
    type: string
    group: battery
  - key: battery_capacity
    type: number
    positive: true
    group: battery
    unit: kWh
  - key: cltc_electric_range
    type: integer
    positive: true
    group: battery
    list: true
    unit: km
  - key: fast_charging_range
    type: string
    group: battery
    unit: \%
  - key: fast_charging_time
    type: integer
    positive: true
    group: battery
    unit: min
  - key: integrated_battery_body
    type: bool
    group: battery
# ------------ drivetrain ------------
  - key: motor_layout
    type: enum
    values: [Front, Rear, Front+Rear]
    group: drivetrain
    filter:
      control: enum
  - key: front_motor_max_power
    type: integer
    positive: true
    group: drivetrain
    unit: kW
  - key: front_motor_max_torque
    type: integer
    positive: true
    group: drivetrain
    unit: N*m
  - key: rear_motor_max_power
    type: integer
    positive: true
    group: drivetrain
    unit: kW
  - key: rear_motor_max_torque
    type: integer
    positive: true
    group: drivetrain
    unit: N*m
  - key: motor_num
    type: integer
    positive: true
    group: drivetrain
    unit: pcs
  - key: acceleration_0_100
    type: number
    positive: true
    group: drivetrain
    unit: S
  - key: max_speed
    type: integer
    positive: true
    group: drivetrain
    unit: km/h
  - key: silicon_carbide_electric_drive
    type: bool
    group: drivetrain
  - key: distributed_traction_control
    type: bool
    group: drivetrain
  - key: intelligent_torque_control
    type: bool
    group: drivetrain
  - key: drive_mode
    type: array
    items: { type: string }
    group: drivetrain
# ------------ suspension ------------
  - key: front_suspension
    type: enum
    values: [DoubleWishbone, MacPherson]
    group: suspension
  - key: rear_suspension
    type: enum
    values: [5Link, 4Link, 3Link, TorsionBeam]
    group: suspension
  - key: air_suspension
    type: enum
    values: [DoubleChamber, SingleChamber]
    group: suspension
  - key: damping_body_control
    type: bool
    group: suspension
  - key: damping_body_preview
    type: bool
    group: suspension
  - key: suspension_adjust
    type: array
    items:
      {
        type: enum,
        values:
          [
            SoftHard,
            HighLow,
          ]
      }
    group: suspension
  - key: speed_adjust_body_height
    type: bool
    group: suspension
  - key: minimum_ground_clearance
    type: integer
    positive: true
    group: suspension
    unit: mm
  - key: minimum_ground_clearance_after_air_suspension
    type: integer
    positive: true
    group: suspension
    unit: mm
# ------------ wheel ------------
  - key: wheel_drive
    type: enum
    values: [FWD, RWD, 4WD]
    group: wheel
  - key: front_wheel
    type: string
    group: wheel
  - key: rear_wheel
    type: string
    group: wheel
  - key: tires_brand
    type: enum
    values: [Michelin, GoodYear]
    group: wheel
  - key: rear_wheel_steering
    type: bool
    group: wheel
  - key: min_turn_radius
    type: number
    positive: true
    group: wheel
    unit: m
  - key: hub_type
    type: enum
    values: [LowWindResistance, MultiSpoke, LargeDisc]
    group: wheel
  - key: aluminium_alloy_hub
    type: bool
    group: wheel
  - key: front_brake
    type: enum
    values: [Vented, VentilationPunching]
    group: wheel
  - key: rear_brake
    type: enum
    values: [Vented, VentilationPunching]
    group: wheel
  - key: four_piston_caliper
    type: array
    items:
      {
        type: enum,
        values:
          [
            Front,
            Rear,
          ]
      }
    group: wheel
  - key: auto_hold
    type: bool
    group: wheel
  - key: tire_pressure_monitor
    type: enum
    values: [Direct, Indirect]
    group: wheel
  - key: suspended_wheel_marker
    type: bool
    group: wheel
# ------------ light ------------
  - key: lighting_source
    type: enum
    values: [LED, Halogen]
    group: light
  - key: DRL
    type: bool
    group: light
  - key: full_width_head_light
    type: bool
    group: light
  - key: corner_lighting
    type: bool
    group: light
  - key: front_auto_light
    type: bool
    group: light
  - key: front_light_auto_height
    type: bool
    group: light
  - key: AFL
    type: bool
    group: light
  - key: dynamic_cornering_light
    type: bool
    group: light
  - key: front_lighting_logo
    type: bool
    group: light
  - key: rear_lighting_logo
    type: bool
    group: light
  - key: full_width_tail_light
    type: bool
    group: light
  - key: surround_ambient_light
    type: bool
    group: light
  - key: front_passenger_ambient_light
    type: bool
    group: light
  - key: indoor_light
    type: string
    group: light
  - key: adas_blue_light
    type: bool
    group: light
  - key: welcome_light_carpet
    type: bool
    group: light
# ------------ doors_windows ------------
  - key: door_handle_type
    type: enum
    values: [SemiConcealed, FullyConcealed, Pull]
    group: doors_windows
  - key: electric_suction_door
    type: bool
    group: doors_windows
  - key: electric_open_close_door
    type: bool
    group: doors_windows
  - key: skylight_type
    type: enum
    values: [PanoramicSkyScreen, OpenableSkylight, None]
    group: doors_windows
  - key: sunshade_type
    type: enum
    values: [ElectricSunshade, None]
    group: doors_windows
  - key: mezzanine_canopy
    type: bool
    group: doors_windows
  - key: heat_protecting_glass
    type: string
    group: doors_windows
  - key: double_layer_soundproof_glass
    type: string
    group: doors_windows
  - key: privacy_glass
    type: string
    group: doors_windows
  - key: four_window_one_key_handle
    type: bool
    group: doors_windows
  - key: interior_rearview_auto_antiglare
    type: bool
    group: doors_windows
  - key: electric_fold_exterior_rearview
    type: bool
    group: doors_windows
  - key: heated_exterior_rearview
    type: bool
    group: doors_windows
  - key: exterior_rearview_reversing_auto_adjust
    type: bool
    group: doors_windows
  - key: exterior_rearview_memory
    type: bool
    group: doors_windows
  - key: electric_tailgate
    type: bool
    group: doors_windows
  - key: rain_sensing_wiper
    type: bool
    group: doors_windows
  - key: rear_windshield_wiper
    type: bool
    group: doors_windows
  - key: rear_gear_electric_defrost
    type: bool
    group: doors_windows
  - key: electric_pedal
