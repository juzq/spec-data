# --------------no_group--------------
  - key: url
    type: string
    pattern: '^https:\/\/'
    # 故意不挂 group: 详情页底部链接读取，不在 SpecTable / 列表里渲染

derived_fields:
  - key: name
    formula: '{brand} {model}'
    link: '/car/{slug}'
    list: true
  - key: size
    formula: '{length}x{width}x{height}'
    list: true

