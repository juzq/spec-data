    group: light
  - key: dynamic_cornering_light
    type: bool
    group: light
  - key: front_lighting_logo
    type: bool
    group: light
  - key: rear_lighting_logo
    type: bool
    group: light
  - key: full_width_tail_light
    type: bool
    group: light
  - key: surround_ambient_light
    type: bool
    group: light
  - key: front_passenger_ambient_light
    type: bool
    group: light
  - key: front_indoor_light
    type: bool
    group: light
  - key: second_indoor_light
    type: bool
    group: light
  - key: third_indoor_light
    type: bool
    group: light
  - key: adas_blue_light
    type: bool
    group: light
  - key: welcome_light_carpet
    type: bool
    group: light
# ------------ door ------------
  - key: door_handle_type
    type: enum
    values: [SemiConcealed, FullyConcealed, Pull]
    group: door
  - key: electric_suction_door
    type: bool
    group: door
  - key: electric_open_close_door
    type: bool
    group: door
  - key: child_safety_door_lock
    type: bool
    group: door
  - key: skylight_type
