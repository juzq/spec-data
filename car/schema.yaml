groups:
  - basic
  - battery
  - drivetrain
  - body
  - seat
  - smart_cockpit
  - suspension
  - wheel
  - light
  - door
  - active_safe
  - passive_safety
  - adas
  - option


fields:
  - key: slug
    type: string
    pattern: '^[a-z0-9-]+$'
    required: true
# ------------ basic ------------
  - key: brand
    type: enum
    values: [BYD]
    required: true
    group: basic
    filter:
      control: enum
  - key: model
    type: string
    required: true
    group: basic
  - key: type
    type: enum
    values: [SUV, HB, Sedan, MPV, Wagon]
    required: true
    group: basic
    list: true
    filter:
      control: enum
  - key: energy_type
    type: enum
    values: [EV, PHEV, REEV, PV]
    required: true
    group: basic
    list: true
    filter:
      control: enum
  - key: price
    type: integer
    positive: true
    list: true
    group: basic
    unit: ￥
    filter:
      control: range
      stepKind: integer
  - key: color
    type: array
    items: { type: string }
    group: basic
    required: true
  - key: interior_color
    type: array
    items: { type: string }
    group: basic
    required: true
  - key: length
    type: integer
    positive: true
    group: basic
    unit: mm
    filter:
      control: range
      stepKind: integer
  - key: width
    type: integer
    positive: true
    group: basic
    unit: mm
    filter:
      control: range
      stepKind: integer
  - key: height
    type: integer
    positive: true
    group: basic
    unit: mm
    filter:
      control: range
      stepKind: integer
  - key: wheelbase
    type: integer
    positive: true
    list: true
    group: basic
    unit: mm
    filter:
      control: range
      stepKind: integer
  - key: whole_warranty
    type: string
    group: wheel
  - key: max_km_per_12_month
    type: integer
    positive: true
    group: wheel
    unit: km
# ------------ battery ------------
  - key: battery_type
    type: enum
    values: [LFP, TL]
    group: battery
    filter:
      control: enum
  - key: battery_technology
    type: string
    group: battery
  - key: battery_capacity
    type: number
    positive: true
    group: battery
    unit: kWh
  - key: cltc_electric_range
    type: integer
    positive: true
    group: battery
    list: true
    unit: km
  - key: fast_charging_range
    type: string
    group: battery
    unit: \%
  - key: fast_charging_time
    type: integer
    positive: true
    group: battery
    unit: min
  - key: integrated_battery_body
    type: bool
    group: battery
# ------------ drivetrain ------------
  - key: motor_layout
    type: enum
    values: [Front, Rear, Front+Rear]
    group: drivetrain
    filter:
      control: enum
  - key: front_motor_max_power
    type: integer
    positive: true
    group: drivetrain
    unit: kW
  - key: front_motor_max_torque
    type: integer
    positive: true
    group: drivetrain
    unit: N*m
  - key: rear_motor_max_power
    type: integer
    positive: true
    group: drivetrain
    unit: kW
  - key: rear_motor_max_torque
    type: integer
    positive: true
    group: drivetrain
    unit: N*m
  - key: acceleration_0_100
    type: number
    positive: true
    group: drivetrain
    unit: S
  - key: max_speed
    type: integer
    positive: true
    group: drivetrain
    unit: km/h
  - key: silicon_carbide_electric_drive
    type: bool
    group: drivetrain
  - key: distributed_traction_control
    type: bool
    group: drivetrain
  - key: intelligent_torque_control
    type: bool
    group: drivetrain
  - key: drive_mode
    type: array
    items: { type: string }
    group: drivetrain
# ------------ body ------------
  - key: heated_steering_wheel
    type: bool
    group: body
  - key: electric_adjust_steering_wheel
    type: bool
    group: body
  - key: steering_wheel_memory
    type: bool
    group: body
  - key: gearshift_lever_form
    type: enum
    values: [ElectronicGearLever, TraditionalGearLever]
    group: body
  - key: front_makeup_mirror
    type: bool
    group: body
  - key: front_trunk_volume
    type: integer
    positive: true
    group: body
    unit: L
    filter:
      control: range
      stepKind: integer
  - key: electric_front_trunk
    type: bool
    group: body
  - key: passenger_golve_compartment
    type: bool
    group: body
  - key: trunk_volume
    type: integer
    positive: true
    group: body
    unit: L
    filter:
      control: range
      stepKind: integer
  - key: trunk_volume_second_inverted
    type: integer
    positive: true
    group: body
    unit: L
    filter:
      control: range
      stepKind: integer
  - key: trunk_volume_third_inverted
    type: integer
    positive: true
    group: body
    unit: L
  - key: cup_holder
    type: integer
    positive: true
    group: body
    unit: 个
  - key: real_wood_veneer
    type: bool
    group: body
  - key: active_grille_shutter
    type: bool
    group: body
  - key: heat_pump
    type: bool
    group: body
  - key: vihicle_etc
    type: bool
    group: body
  - key: air_cooled_wireless_charging_power
    type: integer
    positive: true
    group: body
    unit: W
  - key: inside_220v_socket_power
    type: number
    positive: true
    group: body
  - key: VTOL_power
    type: number
    positive: true
    group: body
    unit: kW
# ------------ seat ------------
  - key: seat_num
    type: integer
    positive: true
    group: seat
    unit: 个
    filter:
      control: range
      stepKind: integer
  - key: seat_layout
    type: enum
    values: [2+3, 2+2+2, 2+2+3, 2+3+2]
    group: seat
  - key: seat_material
    type: enum
    values: [Nappa, Leather, Fabric]
    group: seat
  - key: zero_gravity_seat
    type: string
    group: seat
  - key: electric_adjust_seat
    type: string
    group: seat
  - key: seat_ventilation
    type: string
    group: seat
  - key: seat_heating
    type: string
    group: seat
  - key: seat_massage
    type: string
    group: seat
  - key: seat_memory
    type: string
    group: seat
  - key: seat_leg_rest
    type: string
    group: seat
  - key: seat_lumbar_support
    type: string
    group: seat
  - key: seat_back_small_table
    type: string
    group: seat
  - key: second_row_independent_aviation_seat
    type: bool
    group: seat
  - key: one_key_seat_folded
    type: string
    group: seat
  - key: seat_46_folded
    type: string
    group: seat
  - key: child_iso_fix
    type: string
    group: seat
# ------------ smart_cockpit ------------
  - key: vehicle_os
    type: string
    group: smart_cockpit
  - key: vehicle_chip
    type: string
    group: smart_cockpit
  - key: vehicle_chip_process
    type: integer
    positive: true
    group: smart_cockpit
    unit: nm
  - key: network_type
    type: enum
    values: [5G, 4G]
    group: smart_cockpit
  - key: instrument_panel_size
    type: number
    positive: true
    group: smart_cockpit
    unit: inch
  - key: central_control_screen_size
    type: number
    positive: true
    group: smart_cockpit
    unit: inch
  - key: central_control_screen_resolution
    type: enum
    values: [1K, 2K, 3K, 4K]
    group: smart_cockpit
  - key: front_passenger_screen_size
    type: number
    positive: true
    group: smart_cockpit
    unit: inch
  - key: hud_size
    type: integer
    positive: true
    group: smart_cockpit
    unit: inch
  - key: rear_entertain_screen_size
    type: number
    positive: true
    group: smart_cockpit
    unit: inch
  - key: rear_entertain_screen_resolution
    type: enum
    values: [1K, 2K, 3K, 4K]
    group: smart_cockpit
  - key: rear_multi_function_screen
    type: bool
    group: smart_cockpit
  - key: aircondition
    type: string
    group: smart_cockpit
  - key: fragrance_system
    type: bool
    group: smart_cockpit
  - key: refrigerator_volume
    type: integer
    positive: true
    group: smart_cockpit
    unit: L
    filter:
      control: range
      stepKind: integer
  - key: vehicle_audio_brand
    type: enum
    group: smart_cockpit
    values: [Devialet, Dynaudio]
  - key: vehicle_audio_num
    type: integer
    positive: true
    group: smart_cockpit
    unit: 个
  - key: driver_head_speaker_num
    type: integer
    positive: true
    group: smart_cockpit
    unit: 个
  - key: front_passenger_head_speaker_num
    type: integer
    positive: true
    group: smart_cockpit
    unit: 个
  - key: dolby_atmos
    type: bool
    group: smart_cockpit
  - key: privacy_sound_shield
    type: bool
    group: smart_cockpit
  - key: exterior_speaker
    type: bool
    group: smart_cockpit
  - key: exterior_microphone
    type: bool
    group: smart_cockpit
  - key: ai_agent
    type: string
    group: smart_cockpit
  - key: driver_face_recognize
    type: bool
    group: smart_cockpit
  - key: karaoke_without_microphone
    type: bool
    group: smart_cockpit
  - key: app_remote_control
    type: bool
    group: smart_cockpit
  - key: bluetooth_key
    type: bool
    group: smart_cockpit
  - key: nfc_key
    type: bool
    group: smart_cockpit
  - key: car_driving_recorder
    type: enum
    values: [Forward, 4Side]
    group: smart_cockpit
  - key: AVM
    type: bool
    group: smart_cockpit
  - key: sentinel_mode
    type: bool
    group: smart_cockpit
  - key: SR
    type: bool
    group: smart_cockpit
  - key: emergency_call
    type: bool
    group: smart_cockpit
  - key: comfort_control
    type: bool
    group: smart_cockpit
  - key: customized_button_num
    type: integer
    positive: true
    group: smart_cockpit
    unit: 个
# ------------ suspension ------------
  - key: front_suspension
    type: enum
    values: [DoubleWishbone, MacPherson]
    group: suspension
  - key: rear_suspension
    type: enum
    values: [5Link, 4Link, 3Link, TorsionBeam]
    group: suspension
  - key: air_suspension
    type: enum
    values: [DoubleChamber, SingleChamber]
    group: suspension
  - key: damping_body_control
    type: bool
    group: suspension
  - key: damping_body_preview
    type: bool
    group: suspension
  - key: suspension_adjust
    type: array
    items:
      {
        type: enum,
        values:
          [
            SoftHard,
            HighLow,
          ]
      }
    group: suspension
  - key: speed_adjust_body_height
    type: bool
    group: suspension
# ------------ wheel ------------
  - key: wheel_drive
    type: enum
    values: [FWD, RWD, 4WD]
    group: wheel
  - key: front_wheel
    type: string
    group: wheel
  - key: rear_wheel
    type: string
    group: wheel
  - key: rear_wheel_steering
    type: bool
    group: wheel
  - key: min_turn_radius
    type: number
    positive: true
    group: wheel
    unit: m
  - key: hub_type
    type: enum
    values: [LowWindResistance, MultiSpoke, LargeDisc]
    group: wheel
  - key: front_brake
    type: enum
    values: [Vented, VentilationPunching]
    group: wheel
  - key: rear_brake
    type: enum
    values: [Vented, VentilationPunching]
    group: wheel
  - key: four_piston_caliper
    type: array
    items:
      {
        type: enum,
        values:
          [
            Front,
            Rear,
          ]
      }
    group: wheel
  - key: auto_hold
    type: bool
    group: wheel
  - key: tire_pressure_monitor
    type: enum
    values: [Direct, Indirect]
    group: wheel
  - key: suspended_wheel_marker
    type: bool
    group: wheel
# ------------ light ------------
  - key: lighting_source
    type: enum
    values: [LED, Halogen]
    required: true
    group: light
  - key: DRL
    type: bool
    group: light
  - key: full_width_head_light
